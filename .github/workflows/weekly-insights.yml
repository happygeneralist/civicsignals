name: Weekly insights

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. This runs on Friday afternoon UK time.
    # It is 16:00 in winter and 17:00 during British Summer Time.
    - cron: '0 16 * * 5'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest feeds
        run: npm run ingest

      - name: Generate Gemini-enhanced weekly signals
        run: npm run signals:generate
        env:
          SIGNALS_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-flash-latest' }}

      - name: Commit weekly signal data
        run: |
          if git diff --quiet -- src/data/signals/latest.json src/data/signals/weekly-themes.json; then
            echo "No weekly signal changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/signals/latest.json src/data/signals/weekly-themes.json
            git commit -m "Update weekly insights data"
            git push
          fi

      - name: Show generated status
        run: cat src/data/status.json

      - name: Build site
        run: npm run build

      - name: Upload GitHub Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
